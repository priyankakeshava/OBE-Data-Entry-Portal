<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OBE Portal - Add Course</title>
  <style>
    :root { --primary: #4f46e5; --primary-dark: #4338ca; --bg: #f4f7fb; --card: #ffffff; --border: #dbe3f0; --text: #1f2937; --muted: #6b7280; --danger: #dc2626; --success: #16a34a; }
    * { box-sizing: border-box; font-family: Arial, sans-serif; }
    body { margin: 0; background: var(--bg); color: var(--text); }
    .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
    .header { margin-bottom: 24px; }
    .header h1 { margin: 0; font-size: 32px; color: #111827; }
    .header p { margin-top: 8px; color: var(--muted); }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 24px; box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05); }
    
    /* Step Navigation styling */
    .steps { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
    .step { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 14px; }
    .step .circle { width: 32px; height: 32px; border-radius: 50%; background: #e5e7eb; display: grid; place-items: center; font-weight: bold; }
    .step.active { color: var(--primary-dark); font-weight: bold; }
    .step.active .circle { background: var(--primary); color: white; }
    .step.completed .circle { background: var(--success); color: white; }
    
    /* Section hiding/showing */
    .step-section { display: none; }
    .step-section.active { display: block; }
    
    form { display: grid; gap: 20px; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 20px; }
    .field { display: flex; flex-direction: column; gap: 8px; }
    .full { grid-column: 1 / -1; }
    label { font-size: 14px; font-weight: 600; }
    input, select, textarea { width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid var(--border); outline: none; font-size: 14px; transition: 0.2s; }
    textarea { min-height: 120px; resize: vertical; }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,0.12); }
    .error { display: none; font-size: 12px; color: var(--danger); }
    .error.show { display: block; }
    .actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 20px; }
    button { border: none; border-radius: 10px; padding: 12px 18px; cursor: pointer; font-size: 14px; font-weight: 600; }
    .btn-secondary { background: #e5e7eb; color: #111827; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-success { background: var(--success); color: white; }
    .btn-dashboard { background: #111827; color: white; text-decoration: none; display: inline-block; padding: 12px 18px; border-radius: 10px; font-size: 14px; font-weight: 600; margin-bottom: 20px;}
    .review-box { background: #f8fafc; padding: 20px; border-radius: 10px; border: 1px solid var(--border); }
    .review-box p { margin: 0 0 10px; }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="btn-dashboard">← Back to Dashboard</a>
    
    <div class="header">
      <h1>Course Details Entry</h1>
      <p>Add a new course to the curriculum.</p>
    </div>

    <div class="card">
      <div class="steps" id="step-indicators">
        <div class="step active" id="indicator-1"><div class="circle">1</div> Basic Info</div>
        <div class="step" id="indicator-2"><div class="circle">2</div> Syllabus</div>
        <div class="step" id="indicator-3"><div class="circle">3</div> Review</div>
      </div>

      <form id="courseForm">
        
        <div class="step-section active" id="section-1">
          <div class="grid">
            <div class="field">
              <label>Course Code *</label>
              <input type="text" id="courseCode" placeholder="e.g. CS301" required />
              <div class="error" id="courseCodeError">Enter a valid course code.</div>
            </div>
            <div class="field">
              <label>Course Name *</label>
              <input type="text" id="courseName" placeholder="e.g. Data Structures" required />
              <div class="error" id="courseNameError">Course name is required.</div>
            </div>
            <div class="field">
              <label>Department *</label>
              <select id="department" required>
                <option value="">Select Department</option>
                <option>Computer Science</option>
                <option>Information Technology</option>
                <option>Electronics</option>
              </select>
              <div class="error" id="departmentError">Please select a department.</div>
            </div>
          </div>
          <div class="actions">
            <button type="button" class="btn-primary" onclick="goToStep(2)">Next Step</button>
          </div>
        </div>

        <div class="step-section" id="section-2">
          <div class="grid">
            <div class="field">
              <label>Credits *</label>
              <input type="number" id="credits" min="1" max="10" placeholder="e.g. 4" required />
              <div class="error" id="creditsError">Enter valid credits.</div>
            </div>
            <div class="field full">
              <label>Course Description</label>
              <textarea id="courseDesc" placeholder="Enter a brief description..."></textarea>
            </div>
          </div>
          <div class="actions">
            <button type="button" class="btn-secondary" onclick="goToStep(1)">Back</button>
            <button type="button" class="btn-primary" onclick="goToStep(3)">Review Details</button>
          </div>
        </div>

        <div class="step-section" id="section-3">
          <div class="review-box" id="reviewContent">
            </div>
          <div class="actions">
            <button type="button" class="btn-secondary" onclick="goToStep(2)">Back</button>
            <button type="submit" class="btn-success">Confirm & Save Course</button>
          </div>
        </div>

      </form>
    </div>
  </div>

  <script>
    const currentUser = localStorage.getItem("currentUser") || "Unknown Faculty";
    
    function showError(id, show) {
      document.getElementById(id).classList.toggle("show", show);
    }

    // Multi-Step Logic
    function validateStep1() {
      let valid = true;
      const cc = document.getElementById("courseCode").value.trim();
      const cn = document.getElementById("courseName").value.trim();
      const dept = document.getElementById("department").value.trim();
      showError("courseCodeError", !cc); if(!cc) valid = false;
      showError("courseNameError", !cn); if(!cn) valid = false;
      showError("departmentError", !dept); if(!dept) valid = false;
      return valid;
    }

    function validateStep2() {
      let valid = true;
      const credits = document.getElementById("credits").value;
      showError("creditsError", credits <= 0 || credits === ""); 
      if(credits <= 0 || credits === "") valid = false;
      return valid;
    }

    function goToStep(step) {
      // Validation checks before moving forward
      if(step === 2 && !validateStep1()) return;
      if(step === 3 && !validateStep2()) return;

      // Update UI Sections
      document.querySelectorAll('.step-section').forEach(el => el.classList.remove('active'));
      document.getElementById(`section-${step}`).classList.add('active');

      // Update Top Indicators
      document.querySelectorAll('.step').forEach((el, index) => {
        el.classList.remove('active');
        if (index < step - 1) el.classList.add('completed');
        else el.classList.remove('completed');
      });
      document.getElementById(`indicator-${step}`).classList.add('active');

      // Build Review Data if moving to Step 3
      if(step === 3) {
        document.getElementById("reviewContent").innerHTML = `
          <p><strong>Code:</strong> ${document.getElementById("courseCode").value.toUpperCase()}</p>
          <p><strong>Name:</strong> ${document.getElementById("courseName").value}</p>
          <p><strong>Department:</strong> ${document.getElementById("department").value}</p>
          <p><strong>Credits:</strong> ${document.getElementById("credits").value}</p>
        `;
      }
    }

    // Final Save Logic
    document.getElementById("courseForm").addEventListener("submit", function(e) {
      e.preventDefault();
      
      const title = document.getElementById("courseName").value;
      const context = document.getElementById("courseCode").value.toUpperCase();
      
      // Get existing entries array, add new entry
      let entries = JSON.parse(localStorage.getItem("obe_entries")) || [];
      entries.push({
        type: "Course",
        title: title,
        context: context,
        author: currentUser,
        date: new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
      });
      
      localStorage.setItem("obe_entries", JSON.stringify(entries));
      
      alert("Course Successfully Saved!");
      window.location.href = "index.html";
    });
  </script>
</body>
</html>
