<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OBE Portal – Review & Submit</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;background:#f1f5f9}
  h1,h2,h3,h4{font-family:'Plus Jakarta Sans',sans-serif}
  ::-webkit-scrollbar{width:4px;height:4px} ::-webkit-scrollbar-thumb{background:#475569;border-radius:4px}
  .fade{animation:fadeUp .3s ease}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .prog-bar{transition:width .6s cubic-bezier(.4,0,.2,1)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const ALL_POS = [
  {id:'PO1',short:'Engineering Knowledge'},{id:'PO2',short:'Problem Analysis'},
  {id:'PO3',short:'Design/Development'},{id:'PO4',short:'Investigation'},
  {id:'PO5',short:'Modern Tools'},{id:'PO6',short:'Engineer & Society'},
];
const COS_CS301 = [
  {id:'CO1',title:'Understand data structure concepts'},
  {id:'CO2',title:'Implement linear data structures'},
  {id:'CO3',title:'Analyse tree and graph algorithms'},
  {id:'CO4',title:'Apply sorting and searching techniques'},
];

function cc(...a){ return a.filter(Boolean).join(' '); }

function BarChartCanvas({ data, labels }) {
  const ref  = useRef(null);
  const inst = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    if (inst.current) { inst.current.destroy(); inst.current = null; }
    inst.current = new Chart(ref.current, {
      type:'bar',
      data:{
        labels,
        datasets:[{
          data,
          backgroundColor: data.map(v => v>=2?'#059669':v>=1?'#D97706':'#e2e8f0'),
          borderRadius:6, maxBarThickness:40,
        }]
      },
      options:{
        responsive:true,
        plugins:{legend:{display:false}},
        scales:{y:{max:3,min:0,ticks:{stepSize:1}},x:{grid:{display:false}}}
      }
    });
    return () => { if(inst.current){ inst.current.destroy(); inst.current=null; } };
  }, [JSON.stringify(data), JSON.stringify(labels)]);
  return <canvas ref={ref} />;
}

function DoughnutCanvas({ slices }) {
  const ref  = useRef(null);
  const inst = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    if (inst.current) { inst.current.destroy(); inst.current = null; }
    inst.current = new Chart(ref.current, {
      type:'doughnut',
      data:{
        labels: slices.map(s => s.label),
        datasets:[{data: slices.map(s => s.value), backgroundColor: slices.map(s => s.color), borderWidth:2}]
      },
      options:{responsive:true,cutout:'60%',plugins:{legend:{position:'bottom',labels:{boxWidth:10,padding:8,font:{size:11}}}}}
    });
    return () => { if(inst.current){ inst.current.destroy(); inst.current=null; } };
  }, [JSON.stringify(slices)]);
  return <canvas ref={ref} />;
}

function Sidebar({ active }) {
  const mainItems = [
    {id:'dashboard',icon:'⊞',label:'Dashboard',        href:'index.html'},
    {id:'add-course',icon:'📚',label:'Add Course',        href:'details.html'},
    {id:'add-co',icon:'🎯',label:'Add CO',        href:'CO.html'},
    {id:'add-po',icon:'📋',label:'Add PO',        href:'PO.html'},
    {id:'pso',    icon:'🔵',label:'Add PSO',        href:'pso.html'},
    {id:'mapping',icon:'🔗',label:'CO-PO Mapping',  href:'mapping.html'},
    {id:'review', icon:'✅',label:'Review & Submit', href:'review.html'},
  ];
  
  return (
    <div className="w-64 min-h-screen flex flex-col shrink-0" style={{background:'#111827'}}>
      <div className="px-5 py-5 border-b border-white/10">
        <div className="flex items-center gap-3">
          <div className="w-10 h-10 rounded-xl flex items-center justify-center text-white font-black text-xs" style={{background:'#7C3AED'}}>OBE</div>
          <span className="text-white font-bold text-lg" style={{fontFamily:'Plus Jakarta Sans'}}>OBE Portal</span>
        </div>
      </div>
      <nav className="flex-1 px-3 py-4">
        <p className="text-xs font-bold text-gray-500 uppercase tracking-widest px-3 py-2">Main</p>
        {mainItems.map(it => (
  <a key={it.id} href={it.href}
    className={cc('flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-all no-underline',
      active===it.id ? 'font-semibold text-white' : 'text-gray-400 hover:text-white hover:bg-white/10')}
    style={active===it.id ? {background:'rgba(37,99,235,0.25)',borderLeft:'3px solid #60A5FA'} : {}}>
    <span>{it.icon}</span><span>{it.label}</span>
  </a>
))}

      </nav>
      <div className="px-3 pb-4 border-t border-white/10 pt-3">
        <p className="text-xs font-bold text-gray-500 uppercase tracking-widest px-3 py-1.5">Settings</p>
        <button className="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-400 hover:text-red-400 hover:bg-red-900/20 transition-all text-left">
          <span>🚪</span><span>Logout</span>
        </button>
      </div>
    </div>
  );
}

function TopBar({ title }) {
  return (
    <div className="bg-white border-b border-gray-100 px-8 py-3 flex items-center justify-between sticky top-0 z-20">
      <div className="flex items-center gap-2 text-sm">
        <span className="text-gray-400">OBE Portal</span>
        <span className="text-gray-300">›</span>
        <span className="text-gray-900 font-semibold">{title}</span>
      </div>
      <div className="flex items-center gap-3">
        <div className="w-9 h-9 rounded-full flex items-center justify-center text-white font-bold text-sm" style={{background:'#A01E25'}}>A</div>
        <div className="text-right">
          <p className="text-sm font-semibold text-gray-900 leading-tight">abcdd</p>
          <p className="text-xs text-gray-500">Faculty</p>
        </div>
      </div>
    </div>
  );
}

function App() {
  const loadPsos    = () => { try { return JSON.parse(localStorage.getItem('obe_psos')    || '[]'); } catch { return []; } };
  const loadMapping = () => { try { return JSON.parse(localStorage.getItem('obe_mapping') || '{}'); } catch { return {}; } };

  const [psos]                  = useState(loadPsos);
  const [mapping]               = useState(loadMapping);
  const [modal,    setModal]    = useState(false);
  const [submitted,setSubmitted]= useState(false);
  const subId                   = useRef('OBE-' + Math.random().toString(36).slice(2,8).toUpperCase());

  const courseId = 'CS301';
  const cos      = COS_CS301;

  function getV(coId, tid) { return mapping[`${courseId}__${coId}__${tid}`] || '-'; }

  const totalCells  = cos.length * (ALL_POS.length + psos.slice(0,3).length);
  const mappedCount = Object.values(mapping).filter(v => v !== '-').length;
  const pct         = totalCells > 0 ? Math.min(100, Math.round((mappedCount / totalCells) * 100)) : 0;

  const barLabels = ALL_POS.map(p => p.id);
  const barData   = ALL_POS.map(po => {
    const nums = cos.map(co => getV(co.id, po.id)).filter(v => v !== '-').map(Number);
    return nums.length ? +(nums.reduce((a,b) => a+b, 0) / nums.length).toFixed(2) : 0;
  });

  const high = Object.values(mapping).filter(v => v === '3').length;
  const med  = Object.values(mapping).filter(v => v === '2').length;
  const low  = Object.values(mapping).filter(v => v === '1').length;
  const none = Math.max(0, totalCells - mappedCount);
  const pieSlices = [
    ...(high ? [{label:'High (3)',   value:high, color:'#059669'}] : []),
    ...(med  ? [{label:'Medium (2)', value:med,  color:'#D97706'}] : []),
    ...(low  ? [{label:'Low (1)',    value:low,  color:'#EAB308'}] : []),
    ...(none ? [{label:'Not mapped', value:none, color:'#e2e8f0'}] : []),
  ];
  const safeSlices = pieSlices.length > 0 ? pieSlices : [{label:'No data', value:1, color:'#e2e8f0'}];

  const checklist = [
    {label:'Program Outcomes added',          done: ALL_POS.length > 0,  count: `${ALL_POS.length} POs`},
    {label:'Program Specific Outcomes added', done: psos.length > 0,     count: `${psos.length} PSOs`},
    {label:'Course Outcomes added',           done: cos.length > 0,      count: `${cos.length} COs`},
    {label:'Mapping completion ≥ 50%',        done: pct >= 50,           count: `${pct}%`},
  ];
  const allClear = checklist.every(c => c.done);

  const cellBg = v => v==='3'?'bg-emerald-100 text-emerald-700':v==='2'?'bg-orange-100 text-orange-700':v==='1'?'bg-yellow-100 text-yellow-700':'bg-gray-100 text-gray-400';

  return (
    <div className="flex min-h-screen">
      <Sidebar active="review" />
      <main className="flex-1 overflow-auto" style={{background:'#f1f5f9'}}>
        <TopBar title="Review & Submit" />
        <div className="p-8 fade">
          {/* Header */}
          <div className="flex items-center justify-between mb-7">
            <div className="flex items-center gap-3">
              <div className="w-12 h-12 rounded-2xl bg-emerald-500 flex items-center justify-center text-white text-lg shadow-lg shadow-emerald-200">✓</div>
              <div>
                <h1 className="text-2xl font-bold text-gray-900">Review & Submit</h1>
                <p className="text-gray-500 text-sm mt-0.5">Check completeness, verify data, then submit for review</p>
              </div>
            </div>
            {!submitted && (
              <button onClick={() => { if (allClear) setModal(true); }}
                className="flex items-center gap-2 px-6 py-2.5 rounded-xl text-sm font-semibold text-white transition-all hover:opacity-90"
                style={{background:'#A01E25', opacity: allClear ? 1 : 0.45, cursor: allClear ? 'pointer' : 'not-allowed', boxShadow: allClear ? '0 4px 14px rgba(160,30,37,.3)' : 'none'}}>
                🚀 Final Submit
              </button>
            )}
          </div>

          {/* ── SUCCESS STATE ── */}
          {submitted ? (
            <div className="bg-white rounded-2xl shadow-sm border border-emerald-200 p-16 text-center fade">
              <div className="w-24 h-24 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-5 text-5xl">🎉</div>
              <h2 className="text-2xl font-bold text-emerald-700 mb-2">Submitted Successfully!</h2>
              <p className="text-gray-500 mb-3">All OBE data has been submitted for faculty review.</p>
              <p className="text-sm text-gray-400 bg-gray-100 inline-block px-4 py-1.5 rounded-lg font-mono">ID: {subId.current}</p>
              <div className="mt-6">
                <a href="pso.html" className="text-sm text-blue-600 underline">← Back to PSO page</a>
              </div>
            </div>
          ) : (
            <>
              {/* Stats */}
              <div className="grid grid-cols-4 gap-4 mb-6">
                {[
                  {icon:'PO',bg:'bg-emerald-500',label:'Program Outcomes', val:ALL_POS.length},
                  {icon:'PS',bg:'bg-blue-500',   label:'PSOs Added',        val:psos.length},
                  {icon:'CO',bg:'bg-orange-500', label:'Course Outcomes',   val:cos.length},
                  {icon:'🔗',bg:'bg-purple-500', label:'CO-PO Mappings',    val:mappedCount},
                ].map(s => (
                  <div key={s.label} className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 flex items-center gap-4">
                    <div className={`w-12 h-12 rounded-2xl ${s.bg} flex items-center justify-center text-white font-extrabold text-xs`}>{s.icon}</div>
                    <div><p className="text-xs text-gray-500">{s.label}</p><p className="text-2xl font-bold text-gray-900">{s.val}</p></div>
                  </div>
                ))}
              </div>

              <div className="grid grid-cols-3 gap-6 mb-6">
                {/* Checklist */}
                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
                  <h3 className="font-semibold text-gray-800 mb-4">Submission Checklist</h3>
                  <div className="space-y-2.5">
                    {checklist.map((item, i) => (
                      <div key={i} className={cc('flex items-center gap-3 p-3 rounded-xl border',
                        item.done ? 'bg-emerald-50 border-emerald-200' : 'bg-gray-50 border-gray-200')}>
                        <span className={cc('w-6 h-6 rounded-full inline-flex items-center justify-center text-xs font-bold',
                          item.done ? 'bg-emerald-500 text-white' : 'bg-gray-300 text-gray-500')}>
                          {item.done ? '✓' : '○'}
                        </span>
                        <span className="text-sm text-gray-700 flex-1">{item.label}</span>
                        <span className={cc('text-xs font-semibold', item.done ? 'text-emerald-600' : 'text-gray-400')}>{item.count}</span>
                      </div>
                    ))}
                  </div>
                  <div className="mt-5 pt-4 border-t border-gray-100">
                    <div className="flex justify-between text-xs text-gray-500 mb-2">
                      <span>Mapping Completion</span>
                      <span className="font-bold text-gray-900">{pct}%</span>
                    </div>
                    <div className="h-2.5 bg-gray-100 rounded-full overflow-hidden">
                      <div className="h-full rounded-full prog-bar"
                        style={{width:`${pct}%`, background: pct>=60?'#059669':pct>=30?'#D97706':'#A01E25'}} />
                    </div>
                    <p className="text-xs text-gray-400 mt-1">{mappedCount} of {totalCells} cells filled</p>
                  </div>
                  {!allClear && (
                    <div className="mt-3 bg-amber-50 border border-amber-200 rounded-xl px-3 py-2">
                      <p className="text-xs text-amber-700">⚠️ Complete all items to enable final submission.</p>
                      <div className="mt-2 space-y-1">
                        {!psos.length && <a href="pso.html" className="text-xs text-blue-600 underline block">→ Add PSOs</a>}
                        {pct < 50 && <a href="mapping.html" className="text-xs text-blue-600 underline block">→ Complete CO-PO Mapping</a>}
                      </div>
                    </div>
                  )}
                </div>

                {/* Bar chart */}
                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
                  <h3 className="font-semibold text-gray-800 mb-1">CO-PO Avg Correlation</h3>
                  <p className="text-xs text-gray-400 mb-3">Higher = stronger CO-PO alignment</p>
                  <BarChartCanvas key={'bar'+JSON.stringify(mapping)} data={barData} labels={barLabels} />
                </div>

                {/* Pie/Doughnut chart */}
                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
                  <h3 className="font-semibold text-gray-800 mb-1">Mapping Distribution</h3>
                  <p className="text-xs text-gray-400 mb-3">Correlation level breakdown</p>
                  <DoughnutCanvas key={'pie'+JSON.stringify(mapping)} slices={safeSlices} />
                </div>
              </div>

              {/* PSO Summary */}
              {psos.length > 0 && (
                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 mb-6">
                  <h3 className="font-semibold text-gray-800 mb-4">PSOs Added ({psos.length})</h3>
                  <div className="grid grid-cols-2 gap-3">
                    {psos.map(pso => (
                      <div key={pso.id} className="flex items-start gap-3 p-3 bg-blue-50 rounded-xl border border-blue-100">
                        <span className="w-8 h-8 shrink-0 rounded-xl bg-blue-200 text-blue-800 text-xs font-extrabold inline-flex items-center justify-center">{pso.code}</span>
                        <div className="min-w-0">
                          <p className="text-sm font-semibold text-gray-900 truncate">{pso.title}</p>
                          <p className="text-xs text-gray-500">{pso.program} · {pso.bloom}</p>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* CO-PO Read-only table */}
              <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <div className="px-6 py-4 border-b border-gray-100">
                  <h3 className="font-semibold text-gray-800">CO-PO Mapping Table</h3>
                  <p className="text-xs text-gray-400 mt-0.5">Read-only · CS301: Data Structures</p>
                </div>
                <div className="overflow-x-auto">
                  <table className="w-full text-center">
                    <thead className="bg-gray-50 border-b border-gray-100">
                      <tr>
                        <th className="px-4 py-3 text-left text-xs font-semibold text-gray-500 min-w-48">Course Outcome</th>
                        {ALL_POS.map(po => (
                          <th key={po.id} className="px-3 py-3 text-xs font-semibold text-gray-700">{po.id}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-50">
                      {cos.map((co, ri) => (
                        <tr key={co.id} style={ri%2!==0?{background:'#fafafa'}:{}}>
                          <td className="px-4 py-2.5 text-left">
                            <div className="flex items-center gap-2">
                              <span className="w-6 h-6 rounded-lg bg-orange-100 text-orange-700 text-xs font-bold inline-flex items-center justify-center shrink-0">{co.id}</span>
                              <span className="text-xs text-gray-600">{co.title}</span>
                            </div>
                          </td>
                          {ALL_POS.map(po => {
                            const v = getV(co.id, po.id);
                            return (
                              <td key={po.id} className="px-3 py-2.5">
                                <span className={`inline-flex w-7 h-7 rounded-lg text-xs font-bold items-center justify-center ${cellBg(v)}`}>{v}</span>
                              </td>
                            );
                          })}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </>
          )}
        </div>
      </main>

      {/* ── CONFIRM MODAL ── */}
      {modal && (
        <div className="fixed inset-0 flex items-center justify-center z-50" style={{background:'rgba(0,0,0,0.5)'}}
          onClick={() => setModal(false)}>
          <div className="bg-white rounded-2xl p-7 w-96 shadow-2xl fade" onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between mb-5">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-2xl flex items-center justify-center text-white text-lg" style={{background:'#A01E25'}}>🚀</div>
                <h3 className="font-bold text-gray-900 text-lg">Confirm Submission</h3>
              </div>
              <button onClick={() => setModal(false)} className="text-gray-400 hover:text-gray-700 text-2xl leading-none">×</button>
            </div>
            <p className="text-gray-600 text-sm mb-3">You are about to submit the following data:</p>
            <div className="bg-gray-50 rounded-xl p-4 space-y-2 mb-4 border border-gray-200 text-sm">
              {[
                ['Program Outcomes',          ALL_POS.length],
                ['Program Specific Outcomes', psos.length],
                ['Course Outcomes',           cos.length],
                ['CO-PO Mappings',            mappedCount],
              ].map(([k,v]) => (
                <div key={k} className="flex justify-between">
                  <span className="text-gray-600">• {k}</span>
                  <span className="font-bold text-gray-900">{v}</span>
                </div>
              ))}
            </div>
            <div className="bg-amber-50 border border-amber-200 rounded-xl px-4 py-3 text-xs text-amber-800 mb-5">
              ⚠️ This action cannot be undone. Ensure all entries are correct before submitting.
            </div>
            <div className="flex gap-3">
              <button onClick={() => setModal(false)}
                className="flex-1 px-4 py-2.5 border border-gray-200 rounded-xl text-sm font-medium text-gray-700 hover:bg-gray-50 transition-all">
                Cancel
              </button>
              <button onClick={() => { setModal(false); setSubmitted(true); }}
                className="flex-1 px-4 py-2.5 rounded-xl text-sm font-semibold text-white hover:opacity-90 transition-all"
                style={{background:'#A01E25'}}>
                ✓ Confirm & Submit
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
