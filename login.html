<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OBE Portal - Login</title>
  <style>
    body {
      margin: 0;
      background: #f4f7fb;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #1f2937;
    }
    .login-box {
      background: white;
      padding: 40px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .brand-badge {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      background: #4f46e5;
      color: white;
      display: grid;
      place-items: center;
      font-weight: 800;
      font-size: 20px;
      margin: 0 auto 20px;
    }
    h1 { margin: 0 0 10px; font-size: 24px; }
    p { color: #6b7280; margin-bottom: 24px; font-size: 14px; }
    input {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #dbe3f0;
      margin-bottom: 20px;
      box-sizing: border-box;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: #4f46e5;
      color: white;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover { background: #4338ca; }
  </style>
</head>
<body>

  <div class="login-box">
    <div class="brand-badge">OBE</div>
    <h1>Welcome Back</h1>
    <p>Please enter your name to access the portal.</p>
    
    <form id="loginForm">
      <input type="text" id="facultyName" placeholder="e.g. Dr. Faculty" required />
      <button type="submit">Log In</button>
    </form>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const name = document.getElementById("facultyName").value.trim();
      
      // Save name to localStorage and redirect to dashboard
      localStorage.setItem("currentUser", name);
      window.location.href = "index.html";
    });
  </script>

</body>
</html>
